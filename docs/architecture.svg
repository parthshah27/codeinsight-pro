<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">CodeInsight Pro architecture</title>
  <desc id="desc">Single-page React app calls an Express API, which routes review requests through mock, Ollama, or OpenAI provider adapters.</desc>
  <rect width="1100" height="560" fill="#f6f8fa"/>
  <text x="60" y="70" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">CodeInsight Pro Architecture</text>
  <text x="60" y="105" fill="#4b5563" font-family="Arial, sans-serif" font-size="16">Hosted showcase runs in mock mode. Local developers can switch to Ollama without API keys.</text>

  <rect x="60" y="165" width="230" height="110" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="92" y="210" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">React Frontend</text>
  <text x="92" y="240" fill="#4b5563" font-family="Arial, sans-serif" font-size="15">Snippet form and result cards</text>

  <rect x="420" y="165" width="250" height="110" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="452" y="210" fill="#111827" font-family="Arial, sans-serif" font-size="22" font-weight="700">Express API</text>
  <text x="452" y="240" fill="#4b5563" font-family="Arial, sans-serif" font-size="15">Validation, logging, docs</text>

  <rect x="800" y="95" width="230" height="80" rx="8" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="832" y="130" fill="#155e75" font-family="Arial, sans-serif" font-size="20" font-weight="700">Mock Reviewer</text>
  <text x="832" y="154" fill="#155e75" font-family="Arial, sans-serif" font-size="14">Public demo default</text>

  <rect x="800" y="235" width="230" height="80" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="832" y="270" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="700">Local Ollama</text>
  <text x="832" y="294" fill="#166534" font-family="Arial, sans-serif" font-size="14">No cloud API key</text>

  <rect x="800" y="375" width="230" height="80" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="832" y="410" fill="#3730a3" font-family="Arial, sans-serif" font-size="20" font-weight="700">OpenAI</text>
  <text x="832" y="434" fill="#3730a3" font-family="Arial, sans-serif" font-size="14">Optional hosted mode</text>

  <line x1="290" y1="220" x2="420" y2="220" stroke="#2563eb" stroke-width="3"/>
  <polygon points="420,220 406,212 406,228" fill="#2563eb"/>
  <text x="315" y="205" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="14">POST /api/review</text>

  <line x1="670" y1="220" x2="800" y2="135" stroke="#2563eb" stroke-width="3"/>
  <polygon points="800,135 784,137 793,150" fill="#2563eb"/>
  <line x1="670" y1="220" x2="800" y2="275" stroke="#2563eb" stroke-width="3"/>
  <polygon points="800,275 783,276 789,261" fill="#2563eb"/>
  <line x1="670" y1="220" x2="800" y2="415" stroke="#2563eb" stroke-width="3"/>
  <polygon points="800,415 785,407 798,398" fill="#2563eb"/>

  <rect x="420" y="350" width="250" height="90" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="452" y="385" fill="#9a3412" font-family="Arial, sans-serif" font-size="20" font-weight="700">Operational Layer</text>
  <text x="452" y="413" fill="#9a3412" font-family="Arial, sans-serif" font-size="14">/api/health, request IDs, JSON logs</text>
</svg>
