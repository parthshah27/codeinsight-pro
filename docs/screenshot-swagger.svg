<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">CodeInsight Pro Swagger screenshot</title>
  <desc id="desc">Mock screenshot of the Swagger API documentation for CodeInsight Pro.</desc>
  <rect width="1200" height="760" fill="#f7f7f7"/>
  <rect x="0" y="0" width="1200" height="70" fill="#1f2937"/>
  <text x="60" y="44" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="700">Swagger UI</text>
  <rect x="90" y="120" width="1020" height="560" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="130" y="175" fill="#111827" font-family="Arial, sans-serif" font-size="32" font-weight="700">CodeInsight Pro API</text>
  <text x="130" y="210" fill="#4b5563" font-family="Arial, sans-serif" font-size="16">Code review assistant API with mock, Ollama, and OpenAI provider modes.</text>
  <rect x="130" y="260" width="940" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="155" y="303" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="18" font-weight="700">GET</text>
  <text x="230" y="303" fill="#111827" font-family="Consolas, monospace" font-size="18">/api/health</text>
  <rect x="130" y="355" width="940" height="70" rx="6" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="155" y="398" fill="#047857" font-family="Arial, sans-serif" font-size="18" font-weight="700">POST</text>
  <text x="230" y="398" fill="#111827" font-family="Consolas, monospace" font-size="18">/api/review</text>
  <rect x="130" y="450" width="940" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="155" y="493" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="18" font-weight="700">GET</text>
  <text x="230" y="493" fill="#111827" font-family="Consolas, monospace" font-size="18">/api/openapi.json</text>
</svg>
